spring.application.name=student-manager-api

server.port=8080

app.name=student-manager-api
app.version=1.0.0
app.profile=k8s-lab

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

info.app.name=${app.name}
info.app.version=${app.version}
info.app.profile=${app.profile}